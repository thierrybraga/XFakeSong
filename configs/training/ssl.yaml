# SSL/Transformers benchmark preset.

family: ssl-transformers
models:
  - WavLM
  - HuBERT
dataset: app/datasets/benchmark_audio_raw_balanced_15k.npz
output_dir: results/ssl_benchmark
models_dir: app/models
epochs: 100
batch_size: 8
device_profile: gpu
latency_runs: 30
snr: [30, 20, 10]
optimize_hyperparameters: true

