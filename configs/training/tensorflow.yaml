# TensorFlow/Keras benchmark preset.

family: tensorflow-keras
# ordem por custo crescente (ver benchmarks/config.py::ALL_TCC_ARCHITECTURES)
models:
  - MultiscaleCNN
  - Sonic Sleuth
  - EfficientNet-LSTM
  - SpectrogramTransformer
dataset: app/datasets/benchmark_audio_raw_balanced_20k.npz
output_dir: results/tensorflow_benchmark
models_dir: app/models
epochs: 100
batch_size: 32
device_profile: gpu
latency_runs: 30
snr: [30, 20, 10]
optimize_hyperparameters: true

