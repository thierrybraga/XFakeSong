name: Notebooks — executar + renderizar HTML

# Executa os notebooks self-contained de verdade (nbconvert --execute) e
# publica o HTML renderizado como artefato — o leitor do TCC vê os resultados
# sem precisar rodar, e o git fica limpo (notebooks versionados sem outputs).
# Manual por padrão (workflow_dispatch) para não gastar minutos a cada push;
# habilite o `schedule` quando quiser cadência semanal.
on:
  workflow_dispatch:
  # schedule:
  #   - cron: "0 6 * * 1"   # segunda 06:00 UTC

permissions:
  contents: read

jobs:
  render:
    name: Executar + renderizar (self-contained)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      MPLBACKEND: Agg
      XFAKE_API_ONLY: "1"
      # Liga a avaliação gated (treino+métricas em dados sintéticos) para o HTML
      # do TCC mostrar accuracy/AUC/EER reais em vez do placeholder RUN_EVAL=False.
      XFAKE_RUN_EVAL: "1"
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt
      - name: Executar + renderizar para HTML
        run: |
          mkdir -p rendered
          jupyter nbconvert --to html --execute \
            --ExecutePreprocessor.timeout=600 \
            --output-dir rendered \
            notebooks/00_index.ipynb \
            notebooks/features/01_feature_extraction_study.ipynb \
            notebooks/models/03_rawnet2.ipynb \
            notebooks/models/11_multiscale_cnn.ipynb \
            notebooks/models/13_svm.ipynb \
            notebooks/models/14_random_forest.ipynb \
            notebooks/pipeline/01_benchmark_tcc_full_pipeline.ipynb \
            notebooks/pipeline/02_training_model.ipynb \
            notebooks/pipeline/03_inference.ipynb
      - name: Publicar HTML como artefato
        uses: actions/upload-artifact@v7
        with:
          name: notebooks-html
          path: rendered/
          if-no-files-found: error
