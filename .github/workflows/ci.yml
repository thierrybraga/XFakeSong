name: CI

on:
  push:
    branches: ["main", "feature/**"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

# Princípio do menor privilégio: jobs de CI só leem o repositório.
permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint (ruff) — advisório
    runs-on: ubuntu-latest
    # Advisório: a base de código ainda não está 100% lint-clean; o job
    # reporta, mas não bloqueia o merge. Remover quando zerar os achados.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
      - run: pip install ruff
      - run: ruff check app tests benchmarks scripts

  test:
    name: Testes + cobertura
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      XFAKE_API_ONLY: "1"        # evita carregar GPU/Gradio no import
      MPLBACKEND: Agg            # matplotlib headless
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt
      - name: Suíte rápida (exclui smoke) + cobertura
        run: bash scripts/run_tests.sh cov

  security:
    name: Segurança (bandit bloqueia HIGH + pip-audit advisório)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
      - run: pip install bandit pip-audit
      - name: Bandit (SAST — falha em severidade HIGH)
        run: bandit -r app benchmarks scripts -lll
      - name: pip-audit (CVEs em dependências — advisório)
        continue-on-error: true
        run: pip-audit -r requirements.txt

  docs:
    name: Docs (mkdocs --strict)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
      - run: pip install mkdocs mkdocs-material
      - name: Build estrito (falha em links/refs quebrados)
        run: mkdocs build --strict
