# =====================================================================
# XFakeSong — docker-compose (Compose v2 / Docker Desktop 4.x+)
# Usar:  docker compose up -d         (start)
#        docker compose logs -f       (logs)
#        docker compose down          (stop & remove)
#        docker compose build         (rebuild)
# Override GPU: docker compose -f docker-compose.yml -f docker-compose.gpu.yml up -d
# =====================================================================

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        PYTHON_VERSION: "3.11"
    image: xfakesong:latest
    container_name: xfakesong_app
    hostname: xfakesong

    # Carrega variáveis do .env automaticamente (se existir)
    env_file:
      - path: .env
        required: false

    environment:
      DEEPFAKE_ENV: ${DEEPFAKE_ENV:-production}
      DEEPFAKE_LOG_LEVEL: ${DEEPFAKE_LOG_LEVEL:-INFO}
      GRADIO_SERVER_NAME: 0.0.0.0
      GRADIO_SERVER_PORT: "7860"
      # PROD.1: telemetria do Gradio desabilitada (evita timeout em air-gapped)
      GRADIO_ANALYTICS_ENABLED: "False"
      # PROD.4: temp dir explícito
      GRADIO_TEMP_DIR: /tmp/gradio
      # Numba/HF caches no /tmp (já configurado no Dockerfile)
      TF_CPP_MIN_LOG_LEVEL: "2"
      MPLBACKEND: Agg
      # PROD.6: ALLOWED_HOSTS deve INCLUIR 127.0.0.1 para healthcheck funcionar
      # se o admin definir hosts específicos. * é o default seguro para healthcheck.
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-*}

    ports:
      - "${GRADIO_PORT:-7860}:7860"

    volumes:
      # Persistência — paths são interpolados pelo Compose corretamente no Windows
      - ./app/models:/app/app/models
      - ./app/results:/app/app/results
      - ./app/datasets:/app/app/datasets
      - ./logs:/app/logs
      - ./data:/app/data

    restart: unless-stopped

    # SIGTERM dá tempo para Gradio fechar sockets antes do kill
    stop_grace_period: 30s
    stop_signal: SIGTERM

    # Limites de recursos (importante no Windows com WSL2)
    # Ajuste conforme RAM disponível: 8GB+ recomendado para ML
    deploy:
      resources:
        limits:
          memory: ${DOCKER_MEMORY_LIMIT:-8G}
          cpus: "${DOCKER_CPU_LIMIT:-4.0}"
        reservations:
          memory: 2G
          cpus: "1.0"

    # Healthcheck (PROD.2 + PROD.9):
    # - Usa /api/v1/system/health (não depende do Gradio estar 100% renderizado)
    # - start_period 180s (TF + 14 modelos demoram em CPU)
    # - retries 5 cobrem janelas de garbage collection
    healthcheck:
      test:
        - CMD-SHELL
        - >-
          curl -fsSL -o /dev/null --max-time 5
          http://127.0.0.1:7860/api/v1/system/health ||
          curl -fsSL -o /dev/null --max-time 5
          http://127.0.0.1:7860/ ||
          exit 1
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 180s

    # Logging com rotação para evitar disco cheio
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

    networks:
      - xfakesong_net

networks:
  xfakesong_net:
    driver: bridge
    name: xfakesong_net
