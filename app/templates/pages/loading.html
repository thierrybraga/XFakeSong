{% extends "core/base.html" %}

{% block title %}XfakeSong - Inicializando{% endblock %}

{% block content %}
<div class="loading-view d-flex justify-content-center align-items-center" data-auto-reload="5000">
    <div class="text-center">
        <div class="loading-spinner spinner-border text-primary mb-4" role="status">
            <span class="visually-hidden">Loading...</span>
        </div>
        <h2 class="h3 fw-bold mb-3">Inicializando Sistema</h2>
        <p class="text-muted mb-4">Carregando modelos de IA e configurações...</p>
        
        <div class="loading-progress progress">
            <div
                class="progress-bar progress-bar-striped progress-bar-animated bg-primary"
                role="progressbar"
                aria-valuemin="0"
                aria-valuemax="100"
                aria-valuenow="100"
            ></div>
        </div>
        
        <p class="small text-muted mt-3">Isso pode levar alguns segundos.</p>
    </div>
</div>
{% endblock %}
