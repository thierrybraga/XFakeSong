site_name: XfakeSong
site_description: Plataforma Open Source de Inteligência Artificial para detecção de deepfakes de áudio e forense digital.
site_author: XfakeSong Team
site_url: https://thierrybraga.github.io/XFakeSong/
repo_url: https://github.com/thierrybraga/XFakeSong
repo_name: thierrybraga/XFakeSong
edit_uri: edit/main/docs/

theme:
  name: material
  language: pt-BR
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.tracking
    - navigation.indexes
    - toc.integrate
    - toc.follow
    - search.suggest
    - search.highlight
    - search.share
    - header.autohide
    - content.code.copy
    - content.action.edit
    - content.action.view
    - content.tooltips
  palette:
    - scheme: default
      primary: indigo
      accent: deep purple
      toggle:
        icon: material/weather-sunny
        name: Mudar para modo escuro
    - scheme: slate
      primary: indigo
      accent: deep purple
      toggle:
        icon: material/weather-night
        name: Mudar para modo claro
  font:
    text: Roboto
    code: Roboto Mono

extra_css:
  - stylesheets/extra.css

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/thierrybraga/XFakeSong
      name: XFakeSong no GitHub
    - icon: fontawesome/brands/python
      link: https://python.org
      name: Python
  generator: false

markdown_extensions:
  - admonition
  - abbr
  - attr_list
  - def_list
  - footnotes
  - meta
  - md_in_html
  - toc:
      permalink: true
  - pymdownx.betterem
  - pymdownx.caret
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.smartsymbols
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

nav:
  - Home: index.md
  - Começando:
    - Introdução: 01_INTRODUCAO.md
    - Instalação e Configuração: 02_INSTALACAO_CONFIGURACAO.md
    - Guia Google Colab: 13_COLAB_GUIDE.md
  - Arquitetura:
    - Visão Geral e Estrutura: 03_ARQUITETURA.md
    - Features de Áudio: 04_FEATURES.md
  - Modelos:
    - Arquiteturas Neurais: 08_ARQUITETURAS.md
    - Revisão Técnica das Arquiteturas: 14_REVISAO_ARQUITETURAS.md
    - Fluxos de Inferência: 09_INFERENCIA.md
    - Treinamento: 10_TREINAMENTO.md
  - Avaliação:
    - Benchmark e TCC: 15_BENCHMARK.md
    - Guia de Notebooks: 16_NOTEBOOKS.md
    - Testes e Qualidade: 06_TESTES.md
  - Desenvolvimento:
    - Guia do Desenvolvedor: 05_GUIA_DEV.md
    - API Reference: 07_API_REFERENCE.md
  - Dados:
    - Datasets Públicos: 12_DATASETS.md
  - Deploy:
    - Hugging Face Spaces: 11_DEPLOY_HUGGINGFACE.md
