site_name: XFakeSong
site_description: Plataforma Open Source de Inteligência Artificial para detecção de deepfakes de áudio e forense digital.
site_author: XFakeSong Team
site_url: https://thierrybraga.github.io/XFakeSong/
repo_url: https://github.com/thierrybraga/XFakeSong
repo_name: thierrybraga/XFakeSong
edit_uri: edit/main/docs/

theme:
  name: material
  language: pt-BR
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.tracking
    - navigation.indexes
    - navigation.footer
    - toc.integrate
    - toc.follow
    - search.suggest
    - search.highlight
    - search.share
    - header.autohide
    - content.code.copy
    - content.action.edit
    - content.action.view
    - content.tooltips
  palette:
    - scheme: default
      primary: indigo
      accent: deep purple
      toggle:
        icon: material/weather-sunny
        name: Mudar para modo escuro
    - scheme: slate
      primary: indigo
      accent: deep purple
      toggle:
        icon: material/weather-night
        name: Mudar para modo claro
  font:
    text: Roboto
    code: Roboto Mono

extra_css:
  - stylesheets/extra.css

extra_javascript:
  - javascripts/mathjax.js
  - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/thierrybraga/XFakeSong
      name: XFakeSong no GitHub
    - icon: fontawesome/brands/python
      link: https://python.org
      name: Python
  generator: false

markdown_extensions:
  - admonition
  - abbr
  - attr_list
  - def_list
  - footnotes
  - meta
  - md_in_html
  - toc:
      permalink: true
  - pymdownx.betterem
  - pymdownx.caret
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.smartsymbols
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

nav:
  - Home: index.md
  - Começando:
    - Conceitos e Fundamentos: 00_CONCEITOS.md
    - Introdução: 01_INTRODUCAO.md
    - Instalação e Configuração: 02_INSTALACAO_CONFIGURACAO.md
    - Guia Google Colab: 13_COLAB_GUIDE.md
    - Perguntas Frequentes (FAQ): 19_FAQ.md
  - Arquitetura:
    - Visão Geral e Estrutura: 03_ARQUITETURA.md
    - Features de Áudio: 04_FEATURES.md
  - Modelos:
    - Arquiteturas Neurais: 08_ARQUITETURAS.md
    - Revisão Técnica das Arquiteturas: 14_REVISAO_ARQUITETURAS.md
    - Fluxos de Inferência: 09_INFERENCIA.md
    - Treinamento: 10_TREINAMENTO.md
    - Inferência e Gradio (verificação): 28_INFERENCIA_GRADIO.md
  - Avaliação:
    - Benchmark e Resultados: 15_BENCHMARK.md
    - Estudo Experimental: 20_ESTUDO_EXPERIMENTAL.md
    - Guia de Notebooks: 16_NOTEBOOKS.md
    - Plano de Retreino: 21_PLANO_RETREINO.md
    - Plano de Correções do Benchmark: 25_PLANO_CORRECOES.md
    - Retreino em WSL2: 22_RETREINO_WSL2.md
    - Testes e Qualidade: 06_TESTES.md
  - Interface:
    - Guia da Interface Gradio: 23_INTERFACE_GRADIO.md
  - Desenvolvimento:
    - Guia do Desenvolvedor: 05_GUIA_DEV.md
    - Plano de Ambientes de Treinamento: 26_PLANO_AMBIENTES_TREINAMENTO.md
    - API Reference: 07_API_REFERENCE.md
    - CI/CD e Segurança: 17_CICD_SEGURANCA.md
  - Dados:
    - Datasets Públicos: 12_DATASETS.md
    - Pipeline e Auditoria do Dataset: 27_DATASET_PIPELINE.md
  - Deploy:
    - Hugging Face Spaces: 11_DEPLOY_HUGGINGFACE.md
    - GitHub Pages e Hugging Face: 24_PUBLICACAO_GITHUB_HF.md
  - Glossário: 18_GLOSSARIO.md
  - Projeto:
    - Contribuindo: https://github.com/thierrybraga/XFakeSong/blob/main/CONTRIBUTING.md
    - Código de Conduta: https://github.com/thierrybraga/XFakeSong/blob/main/CODE_OF_CONDUCT.md
    - Política de Segurança: https://github.com/thierrybraga/XFakeSong/blob/main/SECURITY.md
